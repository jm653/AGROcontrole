{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="card border-0 shadow-sm rounded-4">

        <div class="card-body p-5">

            <h3 class="fw-bold mb-4">

                Editar Movimentação

            </h3>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Descrição
                    </label>

                    {{ form.descricao }}

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Tipo
                    </label>

                    {{ form.tipo }}

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Valor
                    </label>

                    {{ form.valor }}

                </div>

                <button
                    type="submit"
                    class="btn btn-coffee"
                >

                    Salvar Alterações

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
