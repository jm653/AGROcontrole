<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AgroControle{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { font-family: 'Poppins', sans-serif; }
    body { background: #F5F5DC; overflow-x: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #3E2723, #4E342E);
      box-shadow: 4px 0 20px rgba(0,0,0,0.15);
      z-index: 999;
    }

    .sidebar-logo {
      color: white;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      padding: 28px 20px 20px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .sidebar-logo i { color: #D7CCC8; margin-right: 6px; }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 0 8px;
      scrollbar-width: none;
    }
    .sidebar-nav::-webkit-scrollbar { display: none; }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(245,245,220,0.82);
      text-decoration: none;
      padding: 13px 20px;
      margin: 2px 10px;
      border-radius: 12px;
      transition: background .2s, transform .2s, color .2s;
      font-size: 14.5px;
      font-weight: 500;
      white-space: nowrap;
    }
    .sidebar-nav a i { font-size: 18px; flex-shrink: 0; }
    .sidebar-nav a:hover {
      background: rgba(255,255,255,0.09);
      transform: translateX(4px);
      color: white;
    }
    .sidebar-nav a.active {
      background: rgba(200,129,58,0.2);
      color: #e8a84e;
    }

    .sidebar-section {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(245,245,220,0.3);
      padding: 14px 22px 4px;
    }

    .sidebar-footer {
      flex-shrink: 0;
      padding: 8px 0 16px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .sidebar-footer a {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(245,245,220,0.6);
      text-decoration: none;
      padding: 13px 20px;
      margin: 2px 10px;
      border-radius: 12px;
      transition: background .2s, color .2s;
      font-size: 14.5px;
      font-weight: 500;
    }
    .sidebar-footer a:hover {
      background: rgba(184,50,50,0.15);
      color: #f4a0a0;
    }
    .sidebar-footer a i { font-size: 18px; }

    /* ── CONTENT ── */
    .content { margin-left: 260px; padding: 28px 30px; }

    /* ── NAVBAR ── */
    .navbar-custom {
      background: white;
      border-radius: 20px;
      padding: 18px 26px;
      margin-bottom: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar-title    { font-size: 22px; font-weight: 700; color: #3E2723; }
    .navbar-subtitle { font-size: 13px; color: #888; }

    .user-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #F5F5DC;
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      color: #4E342E;
    }

    /* ── CARDS ── */
    .card-dashboard {
      border: none;
      border-radius: 20px;
      padding: 8px;
      background: white;
      box-shadow: 0 6px 20px rgba(0,0,0,0.07);
      transition: .25s;
    }
    .card-dashboard:hover { transform: translateY(-5px); }

    .bg-coffee {
      background: linear-gradient(135deg, #4E342E, #6D4C41);
      color: white;
    }

    .card-title  { font-size: 14px; font-weight: 500; }
    .card-number { font-size: 36px; font-weight: 700; }

    .icon-card {
      width: 64px; height: 64px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.15);
    }
    .icon-card i { font-size: 30px; }

    .icon-card-coffee {
      width: 64px; height: 64px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(78,52,46,0.10);
      color: #4E342E;
    }
    .icon-card-coffee i { font-size: 30px; }

    /* ── CHARTS ── */
    .chart-container {
      background: white;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.07);
    }
    .chart-title { color: #4E342E; font-weight: 700; margin-bottom: 20px; }

    /* ── BUTTONS ── */
    .btn-coffee {
      background: #4E342E;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-weight: 600;
      transition: .25s;
    }
    .btn-coffee:hover { background: #3E2723; color: white; transform: translateY(-2px); }

    /* ── ACTION BUTTONS ── */
    .btn-editar {
      background: rgba(78,52,46,0.1); color: #4E342E; border: none;
      border-radius: 7px; width: 30px; height: 30px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .78rem; transition: transform .15s, box-shadow .15s; text-decoration: none;
    }
    .btn-excluir {
      background: rgba(184,50,50,0.1); color: #b83232; border: none;
      border-radius: 7px; width: 30px; height: 30px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .78rem; transition: transform .15s, box-shadow .15s; text-decoration: none;
    }
    .btn-visualizar {
      background: rgba(26,95,160,0.1); color: #1a5fa0; border: none;
      border-radius: 7px; width: 30px; height: 30px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .78rem; transition: transform .15s, box-shadow .15s; text-decoration: none;
    }
    .btn-editar:hover, .btn-excluir:hover, .btn-visualizar:hover {
      transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,.13);
    }

    /* ── TABLES ── */
    .table-container {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.07);
    }

    /* ── MODALS ── */
    .modal-content { border: none; border-radius: 20px; }
    .modal-header  { border-bottom: none; }
    .modal-footer  { border-top: none; }

    /* ── RESPONSIVE ── */
    @media(max-width: 991px) {
      .sidebar { width: 100%; height: auto; position: relative; }
      .content { margin-left: 0; }
    }
  </style>
</head>

<script>
  // Persiste a posição do scroll da sidebar entre páginas
  var nav = document.querySelector('.sidebar-nav');
  var key = 'sidebar_scroll';

  // Restaura ao carregar
  var saved = sessionStorage.getItem(key);
  if (saved) nav.scrollTop = parseInt(saved);

  // Salva ao clicar em qualquer link da sidebar
  document.querySelectorAll('.sidebar-nav a, .sidebar-footer a').forEach(function(a) {
    a.addEventListener('click', function() {
      sessionStorage.setItem(key, nav.scrollTop);
    });
  });
</script>


<body>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="sidebar-logo">
      <i class="bi bi-cup-hot-fill"></i>AgroControle
    </div>

    <div class="sidebar-nav">

      <div class="sidebar-section">Principal</div>

      <a href="{% url 'produtor_dashboard' %}">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>

      <div class="sidebar-section">Produção</div>

      <a href="{% url 'propriedades' %}">
        <i class="bi bi-house-fill"></i> Propriedades
      </a>

      <a href="{% url 'lavouras' %}">
        <i class="bi bi-tree-fill"></i> Lavouras
      </a>

      <a href="{% url 'lotes' %}">
        <i class="bi bi-box-seam"></i> Lotes
      </a>

      <a href="{% url 'rastreabilidade' %}">
        <i class="bi bi-arrow-repeat"></i> Rastreabilidade
      </a>

      <div class="sidebar-section">Gestão</div>

      <a href="{% url 'financeiro' %}">
        <i class="bi bi-cash-stack"></i> Financeiro
      </a>

      <a href="{% url 'relatorios' %}">
        <i class="bi bi-bar-chart-fill"></i> Relatórios
      </a>

      <a href="{% url 'funcionarios' %}">
        <i class="bi bi-people-fill"></i> Funcionários
      </a>

      <a href="{% url 'notificacoes' %}">
        <i class="bi bi-bell-fill"></i> Notificações
      </a>

      <div class="sidebar-section">Conta</div>

      <a href="{% url 'perfil' %}">
        <i class="bi bi-person-circle"></i> Perfil
      </a>

    </div>

    <div class="sidebar-footer">
      <a href="{% url 'logout' %}">
        <i class="bi bi-box-arrow-right"></i> Sair
      </a>
    </div>

  </div>

  <!-- CONTEÚDO -->
  <div class="content">

    <div class="navbar-custom">
      <div>
        <div class="navbar-title">Painel do Produtor</div>
        <div class="navbar-subtitle">Gestão inteligente da produção cafeeira</div>
      </div>
      <div class="user-box">
        <i class="bi bi-person-circle"></i>
        {{ request.user.username }}
      </div>
    </div>

    {% block content %}{% endblock %}

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
