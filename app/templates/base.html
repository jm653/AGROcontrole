<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema Café</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            color: white;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            position: fixed;
            background: #1e1e1e;
            padding: 20px;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>Café System</h4>
    <a href="/dashboard/" class="d-block text-white">Dashboard</a>
    <a href="/logout/" class="d-block text-danger">Sair</a>
</div>

<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
