<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
            AgroControle
        {% endblock %}
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Fonte -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: #F5F5DC;
            overflow-x: hidden;
        }

        /* =========================
           SIDEBAR
        ========================== */

        .sidebar{

            width: 270px;
            min-height: 100vh;

            position: fixed;

            left: 0;
            top: 0;

            padding-top: 25px;

            background:
            linear-gradient(
                180deg,
                #3E2723,
                #4E342E
            );

            box-shadow:
            4px 0 20px rgba(0,0,0,0.15);

            z-index: 999;
        }

        .logo{

            color: white;

            text-align: center;

            font-size: 28px;

            font-weight: 700;

            margin-bottom: 45px;
        }

        .logo i{
            color: #D7CCC8;
        }

        .sidebar a{

            display: flex;

            align-items: center;

            gap: 14px;

            color: #F5F5DC;

            text-decoration: none;

            padding: 16px 25px;

            margin: 8px 12px;

            border-radius: 14px;

            transition: 0.3s;

            font-size: 16px;

            font-weight: 500;
        }

        .sidebar a:hover{

            background:
            rgba(255,255,255,0.08);

            transform: translateX(5px);

            color: white;
        }

        .sidebar a i{
            font-size: 20px;
        }

        /* =========================
           CONTENT
        ========================== */

        .content{
            margin-left: 270px;
            padding: 30px;
        }

        /* =========================
           NAVBAR
        ========================== */

        .navbar-custom{

            background: white;

            border-radius: 24px;

            padding: 20px 28px;

            margin-bottom: 35px;

            box-shadow:
            0 8px 30px rgba(0,0,0,0.08);

            display: flex;

            justify-content: space-between;

            align-items: center;
        }

        .navbar-title{

            font-size: 24px;

            font-weight: 700;

            color: #3E2723;
        }

        .navbar-subtitle{

            font-size: 14px;

            color: #777;
        }

        .user-box{

            background: #F5F5DC;

            padding: 12px 18px;

            border-radius: 15px;

            font-weight: 600;

            color: #4E342E;
        }

        /* =========================
           CARDS
        ========================== */

        .card-dashboard{

            border: none;

            border-radius: 24px;

            padding: 10px;

            background: white;

            box-shadow:
            0 10px 25px rgba(0,0,0,0.08);

            transition: 0.3s;
        }

        .card-dashboard:hover{
            transform: translateY(-7px);
        }

        .bg-coffee{

            background:
            linear-gradient(
                135deg,
                #4E342E,
                #6D4C41
            );

            color: white;
        }

        .card-title{

            font-size: 15px;

            font-weight: 500;
        }

        .card-number{

            font-size: 38px;

            font-weight: 700;
        }

        /* =========================
           ICONES DOS CARDS
        ========================== */

        .icon-card{

            width: 70px;
            height: 70px;

            border-radius: 20px;

            display: flex;

            align-items: center;

            justify-content: center;

            background:
            rgba(255,255,255,0.15);
        }

        .icon-card i{
            font-size: 34px;
        }

        .icon-card-coffee{

            width: 70px;
            height: 70px;

            border-radius: 20px;

            display: flex;

            align-items: center;

            justify-content: center;

            background:
            rgba(78,52,46,0.10);

            color: #4E342E;
        }

        .icon-card-coffee i{
            font-size: 34px;
        }

        /* =========================
           CHARTS
        ========================== */

        .chart-container{

            background: white;

            border-radius: 24px;

            padding: 30px;

            box-shadow:
            0 10px 25px rgba(0,0,0,0.08);
        }

        .chart-title{

            color: #4E342E;

            font-weight: 700;

            margin-bottom: 25px;
        }

        /* =========================
           BOTÕES
        ========================== */

        .btn-coffee{

            background: #4E342E;

            color: white;

            border: none;

            border-radius: 14px;

            padding: 12px 22px;

            font-weight: 600;

            transition: 0.3s;
        }

        .btn-coffee:hover{

            background: #3E2723;

            color: white;

            transform: translateY(-2px);
        }

        /* =========================
           TABELAS
        ========================== */

        .table-container{

            background: white;

            border-radius: 24px;

            padding: 25px;

            box-shadow:
            0 10px 25px rgba(0,0,0,0.08);
        }

        /* =========================
           MODAIS
        ========================== */

        .modal-content{
            border: none;
            border-radius: 24px;
        }

        .modal-header{
            border-bottom: none;
        }

        .modal-footer{
            border-top: none;
        }

        /* =========================
           RESPONSIVO
        ========================== */

        @media(max-width: 991px){

            .sidebar{

                width: 100%;

                height: auto;

                position: relative;
            }

            .content{
                margin-left: 0;
            }
        }

    

    </style>

</head>

<body>

    <!-- SIDEBAR -->

   <div class="sidebar">

    <div class="logo">

        <i class="bi bi-cup-hot-fill"></i>

        AgroControle

    </div>

    <a href="{% url 'produtor_dashboard' %}">

        <i class="bi bi-speedometer2"></i>

        Dashboard

    </a>

    <a href="{% url 'propriedades' %}">

        <i class="bi bi-house-fill"></i>

        Propriedades

    </a>

    <a href="{% url 'lavouras' %}">

        <i class="bi bi-tree-fill"></i>

        Lavouras

    </a>

    <a href="{% url 'lotes' %}">

        <i class="bi bi-box-seam"></i>

        Lotes


    </a>

    <a href="{% url 'rastreabilidade' %}">

        <i class="bi bi-arrow-repeat"></i>

        Rastreabilidade
    </a>

    <a href="{% url 'relatorios' %}">

        <i class="bi bi-bar-chart-fill"></i>

        Relatórios

    </a>

    <a href="{% url 'financeiro' %}">

        <i class="bi bi-cash-stack"></i>

        Financeiro

    </a>

    <a href="{% url 'perfil' %}">

        <i class="bi bi-person-circle"></i>

        Perfil

    </a>

    <a href="{% url 'logout' %}">

        <i class="bi bi-box-arrow-right"></i>

        Sair

    </a>

</div>

    <!-- CONTEÚDO -->

    <div class="content">

        <!-- NAVBAR -->

        <div class="navbar-custom">

            <div>

                <div class="navbar-title">
                    Painel do Produtor
                </div>

                <div class="navbar-subtitle">
                    Gestão inteligente da produção cafeeira
                </div>

            </div>

            <div class="user-box">

                <i class="bi bi-person-circle"></i>

                {{ request.user.username }}

            </div>

        </div>

        <!-- CONTEÚDO DINÂMICO -->

        {% block content %}
        {% endblock %}

    </div>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
