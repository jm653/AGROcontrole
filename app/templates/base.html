<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}AgroControle{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

    body{
        background-color: #F5F5DC;
        overflow-x: hidden;
    }

    .text-coffee{
        color: #4E342E;
    }

    

    .sidebar{
        width: 260px;
        height: 100vh;
        background: linear-gradient(180deg, #3E2723, #4E342E);
        position: fixed;
        left: 0;
        top: 0;
        padding-top: 20px;
        box-shadow: 4px 0 15px rgba(0,0,0,0.15);
    }

    .sidebar h3{
        color: white;
        text-align: center;
        margin-bottom: 40px;
        font-weight: bold;
    }

    .sidebar a{
        display: flex;
        align-items: center;
        gap: 12px;
        color: #F5F5DC;
        padding: 16px 24px;
        text-decoration: none;
        transition: 0.3s;
        font-size: 17px;
        border-left: 4px solid transparent;
    }

    .sidebar a:hover{
        background: rgba(255,255,255,0.08);
        border-left: 4px solid #D7CCC8;
        padding-left: 30px;
    }

    .content{
        margin-left: 260px;
        padding: 30px;
    }

    .card-dashboard{
        border: none;
        border-radius: 22px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        transition: 0.3s;
        background: white;
    }

    .card-dashboard:hover{
        transform: translateY(-6px);
    }

    .bg-coffee{
        background: linear-gradient(135deg, #4E342E, #6D4C41);
        color: white;
    }

    .text-coffee{
    color: #5D4037;
}

    .navbar-custom{
        background: white;
        border-radius: 20px;
        padding: 18px 25px;
        margin-bottom: 30px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .chart-container{
        background: white;
        border-radius: 22px;
        padding: 25px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }
    .text-coffee {
    color: #4E342E;
}

.icon-card {
    width: 70px;
    height: 70px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);

    display: flex;
    align-items: center;
    justify-content: center;
}

.icon-card-coffee {
    width: 70px;
    height: 70px;
    border-radius: 20px;
    background: rgba(78,52,46,0.10);

    display: flex;
    align-items: center;
    justify-content: center;

    color: #4E342E;
}

.card-dashboard {
    transition: 0.3s;
}

.card-dashboard:hover {
    transform: translateY(-6px);
}


    

</style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h3>
            <i class="bi bi-cup-hot-fill"></i>
            AgroControle
        </h3>

        <a href="#">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a href="#">
            <i class="bi bi-tree-fill"></i>
            Lavouras
        </a>

        <a href="#">
            <i class="bi bi-box-seam"></i>
            Lotes
        </a>

        <a href="#">
            <i class="bi bi-arrow-repeat"></i>
            Rastreabilidade
        </a>

        <a href="#">
            <i class="bi bi-bar-chart-fill"></i>
            Relatórios
        </a>

        <a href="#">
            <i class="bi bi-cash-stack"></i>
            Financeiro
        </a>

        <a href="#">
            <i class="bi bi-person-circle"></i>
            Perfil
        </a>

    </div>

    <!-- CONTEÚDO -->

    <div class="content">

        <!-- NAVBAR -->

        <div class="navbar-custom d-flex justify-content-between align-items-center">

            <div>
                <h4 class="m-0">
                    Painel do Produtor
                </h4>
            </div>

            <div>
                <strong>
                    {{ request.user.username }}
                </strong>
            </div>

        </div>

        {% block content %}
        {% endblock %}

    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
