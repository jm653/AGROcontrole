{% extends 'base.html' %}

{% block title %}
Editar Lavoura
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body p-5">

                    <div class="mb-4">

                        <h2 class="fw-bold">
                            Editar Lavoura
                        </h2>

                        <p class="text-muted">
                            Atualize os dados da lavoura
                        </p>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Nome
                                </label>

                                {{ form.nome }}

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Propriedade
                                </label>

                                {{ form.propriedade }}

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Variedade
                                </label>

                                {{ form.variedade }}

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Área
                                </label>

                                {{ form.area }}

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Plantio
                                </label>

                                {{ form.data_plantio }}

                            </div>

                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">

                            <a
                                href="{% url 'lavouras' %}"
                                class="btn btn-light"
                            >
                                Cancelar
                            </a>

                            <button
                                type="submit"
                                class="btn btn-coffee"
                            >
                                Salvar Alterações
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
