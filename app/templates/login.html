<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Café</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1b5e20, #000000);
        }

        .login-card {
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card login-card p-4" style="width: 350px;">
    
    <h3 class="text-center mb-3">☕ Café System</h3>

    {% if erro %}
        <div class="alert alert-danger text-center">{{ erro }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input 
            type="text" 
            name="username" 
            class="form-control mb-3" 
            placeholder="Usuário" 
            required
        >

        <input 
            type="password" 
            name="password" 
            class="form-control mb-3" 
            placeholder="Senha" 
            required
        >

        <button class="btn btn-success w-100 mb-2">
            Entrar
        </button>
    </form>

    <small class="text-center d-block text-muted">
        Sistema de Produção de Café
    </small>

</div>

</body>
</html>
