{% extends 'base.html' %}

{% block title %}
Editar Propriedade
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-sm border-0 rounded-4">

        <div class="card-body p-4">

            <h2 class="fw-bold text-coffee mb-4">

                Editar Propriedade

            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Nome
                    </label>

                    {{ form.nome }}

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Cidade
                    </label>

                    {{ form.cidade }}

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Hectares
                    </label>

                    {{ form.hectares }}

                </div>

                <button
                    type="submit"
                    class="btn btn-coffee"
                >

                    Salvar Alterações

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
